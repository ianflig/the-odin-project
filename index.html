<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
    <title>Calculadora</title>
</head>

<body>
    <div class="main-container">
        <div class="section-calculator-screen">
            <div class="up-text" id="upText"></div>
            <div class="down-text" id="downText"></div>
        </div>
        <div class="section-buttons">
            <button class="gray" id="gray">AC</button>
            <button class="gray">DEL</button>
            <button class="gray">%</button>
            <button class="blue">/</button>

            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="blue">x</button>

            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="blue">-</button>

            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="blue">+</button>

            <button>0</button>
            <button>.</button>
            <button class="btn-large blue">=</button>
        </div>
    </div>
</body>

</html>
