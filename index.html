<!DOCTYPE html>
<html lang="es">
<head>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch a Sketch</title>
</head>

<body>
    <div class="main-container">
        <div class="main-container-two">
            <div class="settings" id="settings">
                <span>Etch-a-Sketch</span>
                <div class="grid-settings" id="grid-settings">
                    <span>Grid Settings</span>
                    <div class="sizeSlider">
                        <div>
                            <span>Tamaño pizarra:</span>
                            <span id="sizeValue">16 x 16</span>
                        </div>
                        <input type="range" min="1" max="100" value="16" id="sizeSlider">
                        <div>
                            <span>Min</span>
                            <span>Max</span>
                        </div>
                    </div>
                </div>
                <div class="brush-tools" id="brush-tools">
                    <span>Herramientas</span>
                    <div>
                        <span>Color solido</span>
                    </div>
                    <div>
                        <span>Arcoiris</span>
                    </div>
                    <div>
                        <span>Borrador</span>
                    </div>
                    <div>
                        <span>Limpiar pizarra</span>
                    </div>
                </div>
            </div>
        
            <div class="grid-container-background">
                <div class="grid-container" id="grid-container"></div>
            </div>
        </div>
    </div>
</body>

</html>
