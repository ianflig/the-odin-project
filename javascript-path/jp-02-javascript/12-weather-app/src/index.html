<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
      integrity="sha512-q6WgHqiHlKyOqslT/lgBgodhd03Wp4BEqKeW6nNtlOY4quzyG3VoQKFrieaCeSnuVseNKRGpGeDU3qPmabCANg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible+Next:ital,wght@0,200..800;1,200..800&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/svg+xml" href="./images/logo.png" />
  </head>

  <body>
    <svg style="display: none" xmlns="http://www.w3.org/2000/svg">
      <symbol id="test-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M621.5-338.5Q680-397 680-480t-58.5-141.5Q563-680 480-680t-141.5 58.5Q280-563 280-480t58.5 141.5Q397-280 480-280t141.5-58.5ZM480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Z">
      </symbol>
    </svg>
    <div class="header">
      <div class="left">
        <svg><use href="#test-icon"></use></svg>
        <span>LOCATION</span>
        <button id="check-location">CHECK YOUR LOCATION</button>
      </div>
      <div class="right">
        <svg><use href="#test-icon"></use></svg>
        <span>today's date</span>
      </div>
    </div>
    <div class="current-conditions-general">
      <div class="left">
        <svg>
          <use href="#test-icon"></use>
        </svg>
        <div>
          <span>temperature</span>
          <span>conditions</span>
          <span>feels like</span>
        </div>
      </div>
      <div class="right">
        <div class="top">
          <div class="sunrise">
            <div class="left">
              <svg><use href="#test-icon"></use></svg>
              <span>sunrise info</span>
            </div>
            <div class="right">hour</div>
          </div>
          <div class="sunset">
            <div class="left">
              <svg><use href="#test-icon"></use></svg>
              <span>sunrise info</span>
            </div>
            <div class="right">hour</div>
          </div>
        </div>
        <div class="bottom">
          <span>UV index</span>
        </div>
      </div>
    </div>
  </body>
</html>
