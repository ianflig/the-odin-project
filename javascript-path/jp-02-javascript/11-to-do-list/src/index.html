    <div class="sidebar">
        <h1>Categories</h1>
        <button class="new-category-btn" id="new-category-btn">
            <svg>
                <use href="#add-category-icon"></use>
            </svg> New Category
        </button>
        <div class="category-container" id="category-container">
        </div>
    </div>
    <div class="header">
        <div class="left">
            <button id="new-task-btn">New Task</button>
        </div>
        <div class="icons">
            <button id="theme-switch">
                <svg>
                    <use href="#moon-icon"></use>
                </svg>
                <svg>
                    <use href="#sun-icon"></use>
                </svg>
            </button>
            <img src="./images/icon.png" alt="avatar">
            <h3>User</h3>
        </div>
    </div>
    <div class="main-content">
        <div class="task-container" id="task-container">
            <h3>Your Tasks</h3>
            <p>Current Category: <span id="current-category">category</span></p>
            <div class="all-tasks" id="all-tasks">
            </div>
        </div>
        <div class="task-description-section">
            <h3>Task Description</h3>
            <div class="description" id="description-section-task-description">
                <h4>Title: <span></span></h4>
                <h4>Due Date: <span></span></h4>
                <h4>Priority: <span></span></h4>
                <h4>Description: <span></span></h4>
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Made by <a href="https://github.com/ianflig" target="_blank" rel="noopener noreferrer">@ianflig</a></p>
    </div>
    <dialog id="delete-dialog" class="delete-dialog">
        <div class="dialog-container">
            <p>Are you sure you want to delete?</p>
            <div class="dialog-buttons-container">
                <button id="delete-close-btn">No</button>
                <button id="delete-confirm-btn">Yes</button>
            </div>
        </div>
    </dialog>
    <dialog id="category-dialog" class="category-dialog">
        <form id="category-form" class="category-form">
            <input type="hidden" name="categoryId" id="hidden-category-id">
            <div class="title-container">
                <label for="category-title">Title</label>
                <input type="text" id="category-title" name="title" minlength="3" maxlength="15">
            </div>
            <div class="dialog-buttons-container">
                <button id="category-close-btn" type="button">Close</button>
                <button type="submit" id="category-save-btn">Save</button>
            </div>
        </form>
    </dialog>
    <dialog id="task-dialog" class="task-dialog">
        <form id="task-form" class="task-form">
            <input type="hidden" name="taskId" id="hidden-task-id">
            <div class="title-container">
                <label for="task-title">Title</label>
                <input type="text" id="task-title" name="title" minlength="1" maxlength="35">
            </div>
            <div class="due-date-container">
                <label for="task-due-date">Due Date</label>
                <input type="date" id="task-due-date" name="dueDate">
            </div>
            <div class="priority-and-status-container">
                <div class="priority-container">
                    <label for="task-priority">Priority</label>
                    <select id="task-priority" name="priority">
                        <option value="Low">Low</option>
                        <option value="Medium">Medium</option>
                        <option value="High">High</option>
                    </select>
                </div>
            </div>
            <div class="description-container">
                <label for="task-description">Description</label>
                <input type="text" id="task-description" name="description">
            </div>
            <div class="dialog-buttons-container">
                <button id="task-close-btn" type="button">Close</button>
                <button type="save" id="task-save-btn">Save</button>
            </div>
        </form>
    </dialog>
    <dialog id="task-warning-dialog" class="task-warning-dialog">
        <div class="dialog-container">
            <p>You must select/create a category first</p>
            <button id="task-warning-close-btn">Close</button>
        </div>
    </dialog>
</body>
