    <link rel="stylesheet" href="./css/styles.css">
    <script src="./js/script.js" defer></script>
</head>

<body>

    <div class="header">
        <div class="header-top">
            <div class="search">
                <label for="search">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"></path>
                    </svg>
                </label>
                <input type="text" placeholder="Search" id="search">
            </div>
            <div class="icons">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0M3.124 7.5A8.969 8.969 0 0 1 5.292 3m13.416 0a8.969 8.969 0 0 1 2.168 4.5"></path>
                </svg>
                <img src="./images/icon.png" alt="avatar">
                <h3>Ianflig</h3>
            </div>
        </div>
        <div class="header-bottom">
            <div class="left">
                <img src="./images/icon.png" alt="avatar">
                <div class="user-details-container">
                    <p>Hi there,</p>
                    <h2>Ianflig (@ianflig)</h2>
                </div>
            </div>
            <div class="right">
                    <dialog id="create-book-dialog">
                        <form id="create-book">
                            <div class="title-container">
                                <label for="book-title">Title</label>
                                <input type="text" id="book-title" name="title" required>
                            </div>
                            <div class="author-and-pages-container">
                                <label for="book-author">Author</label>
                                <input type="text" id="book-author" name="author" required>
                                <label for="book-number-of-pages">Number of pages</label>
                                <input type="number" id="book-number-of-pages" name="pages" required>
                            </div>
                            <div class="read-container">
                                <label for="book-read-checkbox">Already read?</label>
                                <input type="checkbox" id="book-read-checkbox" name="read">
                            </div>
                            <div class="buttons-container">
                                <button id="new-book-close-btn" type="button" autofocus>Close</button>
                                <button type="submit" id="submit-btn">Submit</button>
                            </div>
                        </form>
                    </dialog>
                <button id="new-book">New Book</button>
            </div>
        </div>
    </div>
    <div class="main-content">
        <div class="cards-section">
            <h3>Your Books</h3>
            <p>You can create, delete and read/unread the books</p>
            <div class="all-cards">
            </div>
        </div>
    </div>
    <div class="footer">
        <p>Made by <a href="https://github.com/ianflig" target="_blank" rel="noopener noreferrer">@ianflig</a></p>
    </div>
    <dialog id="delete-book-btn-dialog">
        <p>Are you sure?</p>
        <div class="buttons-container">
            <button id="delete-book-close-btn" autofocus>No</button>
            <button id="delete-confirm-button">Yes</button>
        </div>
    </dialog>
</body>

</html>
